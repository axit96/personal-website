<header class="site-header">
  <div class="brand">
    <span class="brand-link">{{ title() }}</span>
  </div>

  <nav class="nav" aria-label="Primary">
    @for (item of navItems; track item.id) {
      <button class="nav-btn" (click)="scrollTo(item.id)">
        {{ item.label }}
      </button>
    }
  </nav>
</header>

<main class="site-main">
  <router-outlet />
</main>
