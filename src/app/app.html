<header class="site-header">
  <div class="brand">
    <a href="/profile">
      <img src="/akshit_vaishnav_logos_v3_unique.svg" alt="Akshit Vaishnav" class="brand-logo" />
    </a>
  </div>

  <nav class="nav" aria-label="Primary">
    @for (item of navItems; track item.id) {
      <button class="nav-btn" (click)="scrollTo(item.id)">
        {{ item.label }}
      </button>
    }
  </nav>
</header>

<main class="site-main">
  <router-outlet />
</main>
